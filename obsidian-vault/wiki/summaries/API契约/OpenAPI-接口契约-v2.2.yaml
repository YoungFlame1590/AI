openapi: 3.0.3
info:
  title: 图文快印门店连锁管理系统 Print MIS API
  version: 2.2.0
  description: 准生产版 v2 接口契约，在 v2.1 变更冻结基础上追加统一工作流动作、角色任务工作台和订单聚合详情。
servers:
  - url: http://127.0.0.1:8080
security:
  - basicAuth: []
tags:
  - name: Auth
  - name: Dashboard
  - name: Store
  - name: Order
  - name: OrderChangeRequest
  - name: File
  - name: Quotation
  - name: JobTicket
  - name: Production
  - name: Inventory
  - name: Delivery
  - name: Finance
  - name: Audit
  - name: Report
paths:
  /api/auth/login:
    post:
      tags: [Auth]
      security: []
      summary: 登录并返回 Basic Auth token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/me:
    get:
      tags: [Dashboard]
      summary: 当前用户信息
      responses:
        '200':
          description: 当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/me/dashboard:
    get:
      tags: [Dashboard]
      summary: 当前角色工作台数据
      responses:
        '200':
          description: 指标、最近订单、生产看板、库存预警和审计摘要
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/workbench/tasks:
    get:
      tags: [Dashboard]
      summary: 当前角色任务工作台
      description: 从订单状态、变更请求、生产、配送和财务记录实时派生待办任务，不新增任务表。
      responses:
        '200':
          description: 指标、待办任务和最近订单
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/stores:
    get:
      tags: [Store]
      summary: 门店列表
      responses:
        '200':
          description: 门店列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/users:
    get:
      tags: [Auth]
      summary: 用户列表
      responses:
        '200':
          description: 用户列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/orders:
    get:
      tags: [Order]
      summary: 订单列表
      description: 按当前登录用户角色与门店过滤；客户仅返回本人订单，门店角色仅返回本门店订单，配送角色仅返回本人或待接单配送相关订单。
      responses:
        '200':
          description: 按当前角色过滤的订单列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    post:
      tags: [Order]
      summary: 创建订单
      description: customerId、customerName、dueAt、totalAmount 由服务端生成或计算；客户端只能提交订单规格、数量和交付选项。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrintOrder'
      responses:
        '200':
          description: 创建后的订单
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/orders/{id}:
    get:
      tags: [Order]
      summary: 订单详情
      description: 仅允许访问当前登录用户可见范围内的订单。
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 订单详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    put:
      tags: [Order]
      summary: 更新订单
      description: 按角色限制可修改字段；totalAmount 由服务端重新计算，客户端传入值不会作为可信金额。
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrintOrder'
      responses:
        '200':
          description: 更新后的订单
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      tags: [Order]
      summary: 删除订单
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 已删除订单
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/orders/{id}/status:
    post:
      tags: [Order]
      summary: 流转订单状态
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusChange'
      responses:
        '200':
          description: 更新后的订单
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/orders/{orderId}/aggregate:
    get:
      tags: [Order]
      summary: 订单聚合详情
      description: 返回订单、报价、作业单、生产、配送、财务、变更、文件和可执行下一步动作；客户和配送角色不返回审计时间线。
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 当前角色可见的订单聚合视图
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/orders/{orderId}/workflow/actions/{action}:
    post:
      tags: [Order]
      summary: 统一订单工作流动作入口
      description: 统一承接提交审核、报价、作业单、排产、完工、配送、签收、收款、开票、退款和申请变更等动作；旧快捷接口保留兼容。
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [SUBMIT_REVIEW, QUOTE, JOB_TICKET, SCHEDULE_PRODUCTION, COMPLETE_PRODUCTION, CREATE_DELIVERY, ACCEPT_DELIVERY, SIGN_DELIVERY, PAY, INVOICE, REFUND, REQUEST_CHANGE]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: 返回订单、动作结果、下一步任务和消息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/orders/{id}/files:
    get:
      tags: [File]
      summary: 订单文件列表
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 文件列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    post:
      tags: [File]
      summary: 上传订单文件
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 文件元数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/order-change-requests:
    get:
      tags: [OrderChangeRequest]
      summary: 订单变更请求列表
      description: 按当前角色返回可见变更请求；客户只看本人订单变更，门店店长与管理员可审批。
      responses:
        '200':
          description: 可见订单变更请求列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/order-change-requests/{id}:
    get:
      tags: [OrderChangeRequest]
      summary: 订单变更请求详情
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 订单变更请求详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/orders/{orderId}/change-requests:
    post:
      tags: [OrderChangeRequest]
      summary: 创建订单变更请求
      description: 订单进入处理后，产品类型、颜色工艺、页数、份数、交付方式或加急信息变更必须创建请求，冻结生产/SLA，等待店长审批。
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderChangeRequestInput'
      responses:
        '200':
          description: 已创建的待审批变更请求
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/order-change-requests/{id}/approve:
    post:
      tags: [OrderChangeRequest]
      summary: 审批通过订单变更请求
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeDecision'
      responses:
        '200':
          description: 变更已批准，订单字段和金额已重新计算，生产/SLA 冻结解除
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/order-change-requests/{id}/reject:
    post:
      tags: [OrderChangeRequest]
      summary: 驳回订单变更请求
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeDecision'
      responses:
        '200':
          description: 变更已驳回，订单保持原字段，生产/SLA 冻结解除
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/quotations:
    get:
      tags: [Quotation]
      summary: 报价列表
      responses:
        '200':
          description: 报价列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    post:
      tags: [Quotation]
      summary: 创建报价
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Quotation'
      responses:
        '200':
          description: 创建后的报价
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/quotations/{id}:
    get:
      tags: [Quotation]
      summary: 报价详情
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 报价详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    put:
      tags: [Quotation]
      summary: 更新报价
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Quotation'
      responses:
        '200':
          description: 更新后的报价
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      tags: [Quotation]
      summary: 删除报价
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 已删除报价
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/quotations/{id}/approve:
    post:
      tags: [Quotation]
      summary: 审批报价折扣
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 审批后的报价
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/job-tickets:
    get:
      tags: [JobTicket]
      summary: 作业单列表
      responses:
        '200':
          description: 作业单列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    post:
      tags: [JobTicket]
      summary: 创建作业单
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobTicket'
      responses:
        '200':
          description: 创建后的作业单
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/job-tickets/{id}:
    get:
      tags: [JobTicket]
      summary: 作业单详情
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 作业单详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    put:
      tags: [JobTicket]
      summary: 更新作业单
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobTicket'
      responses:
        '200':
          description: 更新后的作业单
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      tags: [JobTicket]
      summary: 删除作业单
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 已删除作业单
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/production-tasks:
    get:
      tags: [Production]
      summary: 生产任务列表
      responses:
        '200':
          description: 生产任务列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    post:
      tags: [Production]
      summary: 创建生产任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductionTask'
      responses:
        '200':
          description: 创建后的生产任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/production-tasks/{id}:
    get:
      tags: [Production]
      summary: 生产任务详情
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 生产任务详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    put:
      tags: [Production]
      summary: 更新生产任务
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductionTask'
      responses:
        '200':
          description: 更新后的生产任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      tags: [Production]
      summary: 删除生产任务
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 已删除生产任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/production-tasks/{id}/complete:
    post:
      tags: [Production]
      summary: 生产完工并质检通过
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 更新后的生产任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/inventory-items:
    get:
      tags: [Inventory]
      summary: 库存物料列表
      responses:
        '200':
          description: 库存列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    post:
      tags: [Inventory]
      summary: 创建库存物料
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryItem'
      responses:
        '200':
          description: 创建后的库存物料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/inventory-items/{id}:
    get:
      tags: [Inventory]
      summary: 库存物料详情
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 库存详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    put:
      tags: [Inventory]
      summary: 更新库存物料
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryItem'
      responses:
        '200':
          description: 更新后的库存物料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      tags: [Inventory]
      summary: 删除库存物料
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 已删除库存物料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/inventory-items/{id}/adjust:
    post:
      tags: [Inventory]
      summary: 库存调整
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryAdjust'
      responses:
        '200':
          description: 调整后的库存物料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/delivery-tasks:
    get:
      tags: [Delivery]
      summary: 配送/外协任务列表
      responses:
        '200':
          description: 配送任务列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    post:
      tags: [Delivery]
      summary: 创建配送/外协任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryTask'
      responses:
        '200':
          description: 创建后的配送任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/delivery-tasks/{id}:
    get:
      tags: [Delivery]
      summary: 配送任务详情
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 配送任务详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    put:
      tags: [Delivery]
      summary: 更新配送任务
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryTask'
      responses:
        '200':
          description: 更新后的配送任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      tags: [Delivery]
      summary: 删除配送任务
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 已删除配送任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/delivery-tasks/{id}/sign:
    post:
      tags: [Delivery]
      summary: 签收配送任务
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                signedBy:
                  type: string
      responses:
        '200':
          description: 签收后的配送任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/invoices:
    get:
      tags: [Finance]
      summary: 发票列表
      responses:
        '200':
          description: 发票列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    post:
      tags: [Finance]
      summary: 创建发票申请
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceRecord'
      responses:
        '200':
          description: 创建后的发票
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/invoices/{id}:
    get:
      tags: [Finance]
      summary: 发票详情
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 发票详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    put:
      tags: [Finance]
      summary: 更新发票
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceRecord'
      responses:
        '200':
          description: 更新后的发票
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      tags: [Finance]
      summary: 删除发票
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 已删除发票
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/invoices/{id}/issue:
    post:
      tags: [Finance]
      summary: 开具发票
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: 已开具发票
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /api/payments:
    get:
      tags: [Finance]
      summary: 收款/退款列表
      responses:
        '200':
          description: 付款记录列表
