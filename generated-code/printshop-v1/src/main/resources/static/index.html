<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>图文快印门店连锁管理系统 v1</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <h1>图文快印门店连锁管理系统 v1</h1>
          <p>七类涉众角色工作台 · Spring Boot 内存演示版</p>
        </div>
        <div class="role-switcher">
          <label for="roleSelect">当前角色</label>
          <select id="roleSelect" aria-label="选择当前角色"></select>
          <strong id="currentUser">-</strong>
        </div>
        <nav class="top-actions" aria-label="快捷入口">
          <a href="/swagger-ui/index.html" target="_blank" rel="noreferrer">Swagger</a>
          <button id="refreshWorkbench" type="button">刷新</button>
          <button id="resetDemo" type="button">重置数据</button>
        </nav>
      </header>

      <section class="status-strip" aria-label="运行状态">
        <div>
          <span class="label">服务状态</span>
          <strong id="serviceStatus">检测中</strong>
        </div>
        <div>
          <span class="label">总请求数</span>
          <strong id="totalRequests">0</strong>
        </div>
        <div>
          <span class="label">最后调用</span>
          <strong id="lastRequestAt">-</strong>
        </div>
        <div>
          <span class="label">当前关注</span>
          <strong id="roleFocus">-</strong>
        </div>
      </section>

      <section class="metric-grid" id="metrics" aria-label="角色指标"></section>

      <section class="layout">
        <aside class="sidebar" aria-label="角色待办">
          <div class="section-head">
            <h2>角色待办</h2>
            <span id="taskCount">0</span>
          </div>
          <div id="taskList" class="task-list"></div>
        </aside>

        <section class="workbench" aria-label="角色工作区">
          <article class="panel order-panel">
            <div class="section-head">
              <h2>订单队列</h2>
              <span id="orderCount">0</span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>订单</th>
                    <th>客户</th>
                    <th>状态</th>
                    <th>金额</th>
                    <th>标签</th>
                  </tr>
                </thead>
                <tbody id="orderRows"></tbody>
              </table>
            </div>
          </article>

          <article class="panel detail-panel">
            <div class="section-head">
              <h2>订单详情与动作</h2>
              <span id="selectedOrder">未选择</span>
            </div>
            <div id="orderDetail" class="detail-grid"></div>
            <div class="action-bar" id="actionBar"></div>
          </article>
        </section>

        <aside class="inspector" aria-label="审计与统计">
          <section class="panel">
            <div class="section-head">
              <h2>模块统计</h2>
              <span>/stats</span>
            </div>
            <div class="module-grid" id="moduleCounts"></div>
          </section>

          <section class="panel">
            <div class="section-head">
              <h2>审计日志</h2>
              <span>最近 8 条</span>
            </div>
            <div id="auditList" class="audit-list">暂无审计日志</div>
          </section>

          <section class="panel">
            <div class="section-head">
              <h2>最近结果</h2>
              <span id="lastMessage">-</span>
            </div>
            <pre id="latestResponse">{}</pre>
          </section>
        </aside>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
