<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>图文快印 Print MIS</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="loginView" class="login-view">
        <form id="loginForm" class="login-card">
          <h1>图文快印 Print MIS</h1>
          <p>订单、报价、作业单、生产、库存、配送、财务与审计一体化</p>
          <label>
            账号
            <input id="username" value="admin" autocomplete="username" />
          </label>
          <label>
            密码
            <input id="password" value="demo123" type="password" autocomplete="current-password" />
          </label>
          <button type="submit">登录系统</button>
          <small>演示账号：customer / clerk / manager / ops / finance / courier / admin，密码均为 demo123</small>
        </form>
      </section>

      <section id="appView" class="main-view hidden">
        <aside class="nav">
          <div class="brand">
            <strong>Print MIS</strong>
            <span>图文快印连锁</span>
          </div>
          <button data-module="dashboard" class="active">工作台</button>
          <button data-module="orders">订单</button>
          <button data-module="quotations">报价</button>
          <button data-module="jobTickets">作业单</button>
          <button data-module="productionTasks">生产排程</button>
          <button data-module="inventoryItems">库存</button>
          <button data-module="deliveryTasks">配送/外协</button>
          <button data-module="invoices">发票</button>
          <button data-module="payments">收款/退款</button>
          <button data-module="audits">审计</button>
          <button data-module="reports">报表</button>
        </aside>

        <section class="content">
          <header class="topbar">
            <div>
              <h1 id="pageTitle">工作台</h1>
              <p id="pageSubTitle">准生产版 Print MIS</p>
            </div>
            <div class="user-box">
              <span id="currentUser">未登录</span>
              <button id="logoutBtn" type="button">退出</button>
            </div>
          </header>

          <section id="metrics" class="metrics"></section>

          <section class="workspace">
            <article class="panel table-panel">
              <div class="panel-head">
                <h2 id="tableTitle">数据列表</h2>
                <div class="actions">
                  <button id="newBtn" type="button">新增</button>
                  <button id="refreshBtn" type="button">刷新</button>
                </div>
              </div>
              <div id="tableWrap" class="table-wrap"></div>
            </article>

            <article class="panel detail-panel">
              <div class="panel-head">
                <h2 id="detailTitle">详情</h2>
                <div id="recordActions" class="actions"></div>
              </div>
              <form id="recordForm" class="record-form"></form>
              <section id="timeline" class="timeline"></section>
            </article>
          </section>

          <section class="panel response-panel">
            <div class="panel-head">
              <h2>最近响应</h2>
              <span id="lastMessage">-</span>
            </div>
            <pre id="responseBox">{}</pre>
          </section>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
