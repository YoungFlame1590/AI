services:
  mysql:
    image: mysql:8.0
    container_name: printshop-v1-mysql
    ports:
      - "13306:3306"
    environment:
      MYSQL_DATABASE: printshop_v1
      MYSQL_USER: printshop
      MYSQL_PASSWORD: printshop123
      MYSQL_ROOT_PASSWORD: root123
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - printshop-v1-mysql:/var/lib/mysql

volumes:
  printshop-v1-mysql:
