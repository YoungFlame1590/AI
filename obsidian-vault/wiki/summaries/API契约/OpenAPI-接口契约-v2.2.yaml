components:
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          nullable: true
        message:
          type: string
        traceId:
          type: string
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: demo123
    StatusChange:
      type: object
      properties:
        status:
          type: string
        step:
          type: string
    InventoryAdjust:
      type: object
      properties:
        delta:
          type: number
          format: decimal
    PrintOrder:
      type: object
      properties:
        id: { type: integer, format: int64 }
        orderNo: { type: string }
        customerId: { type: integer, format: int64 }
        customerName: { type: string }
        storeId: { type: integer, format: int64 }
        storeName: { type: string }
        productType:
          type: string
          enum: [论文胶装, 培训手册, 名片快印, 海报写真, 宣传单页, 写真展板]
          description: 固定产品类型选项。
        colorMode:
          type: string
          enum: [黑白, 彩色, 黑白加彩页, 覆膜, 装订加覆膜]
          description: 固定颜色与后道工艺选项。
        pageCount: { type: integer }
        copies: { type: integer }
        dueAt:
          type: string
          description: 创建订单时默认等于服务端创建时间。
        deliveryMode:
          type: string
          enum: [到店自提, 同城配送, 跨店配送, 外协配送]
        priority:
          type: string
          enum: [普通, 加急, 特急]
        status: { type: string }
        paymentStatus: { type: string }
        currentStep: { type: string }
        totalAmount:
          type: number
          readOnly: true
          description: 服务端根据产品类型、颜色工艺、页数、份数、交付方式和优先级自动计算。
        paidAmount: { type: number }
    Quotation:
      type: object
      properties:
        id: { type: integer, format: int64 }
        quoteNo: { type: string }
        orderId: { type: integer, format: int64 }
        versionNo: { type: integer }
        subtotal: { type: number }
        discountRate: { type: number }
        finalAmount: { type: number }
        status: { type: string }
        validUntil: { type: string }
        approvedBy: { type: string }
    JobTicket:
      type: object
      properties:
        id: { type: integer, format: int64 }
        ticketNo: { type: string }
        orderId: { type: integer, format: int64 }
        quotationId: { type: integer, format: int64 }
        specs: { type: string }
        paperType: { type: string }
        binding: { type: string }
        status: { type: string }
    ProductionTask:
      type: object
      properties:
        id: { type: integer, format: int64 }
        taskNo: { type: string }
        jobTicketId: { type: integer, format: int64 }
        station: { type: string }
        operatorName: { type: string }
        plannedStart: { type: string }
        plannedEnd: { type: string }
        status: { type: string }
        progressPercent: { type: integer }
        qualityStatus: { type: string }
    InventoryItem:
      type: object
      properties:
        id: { type: integer, format: int64 }
        sku: { type: string }
        itemName: { type: string }
        category: { type: string }
        unit: { type: string }
        quantity: { type: number }
        safetyStock: { type: number }
        location: { type: string }
    DeliveryTask:
      type: object
      properties:
        id: { type: integer, format: int64 }
        taskNo: { type: string }
        orderId: { type: integer, format: int64 }
        mode: { type: string }
        carrierName: { type: string }
        targetStore: { type: string }
        status: { type: string }
        signedBy: { type: string }
    InvoiceRecord:
      type: object
      properties:
        id: { type: integer, format: int64 }
        invoiceNo: { type: string }
        orderId: { type: integer, format: int64 }
        title: { type: string }
        taxNo: { type: string }
        amount: { type: number }
        status: { type: string }
        issuedAt: { type: string }
    PaymentRecord:
      type: object
      properties:
        id: { type: integer, format: int64 }
        paymentNo: { type: string }
        orderId: { type: integer, format: int64 }
        amount: { type: number }
        method: { type: string }
        status: { type: string }
        paidAt: { type: string }
    OrderChangeRequestInput:
      type: object
      required: [reason]
      properties:
        productType:
          type: string
          enum: [论文胶装, 培训手册, 名片快印, 海报写真, 宣传单页, 写真展板]
        colorMode:
          type: string
          enum: [黑白, 彩色, 黑白加彩页, 覆膜, 装订加覆膜]
        pageCount:
          type: integer
          minimum: 1
        copies:
          type: integer
          minimum: 1
        deliveryMode:
          type: string
          enum: [到店自提, 同城配送, 跨店配送, 外协配送]
        priority:
          type: string
          enum: [普通, 加急, 特急]
        reason:
          type: string
          description: 变更理由。服务端记录原字段、新字段、金额差异、冻结开始时间和发起人。
    ChangeDecision:
      type: object
      properties:
        comment:
          type: string
          description: 店长或管理员审批意见。
