<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>需求工程智能体</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div>
          <h1>需求工程智能体</h1>
          <p class="muted">图文快印门店连锁管理系统</p>
        </div>

        <section class="panel">
          <label for="apiKey">阿里云百炼 API key</label>
          <div class="key-row">
            <input id="apiKey" type="password" placeholder="sk- 或 dashscope key" autocomplete="off" />
            <button id="toggleKey" type="button" title="显示或隐藏 key">显示</button>
          </div>
          <p id="keyStatus" class="status">输入 key 后启用智能体</p>
        </section>

        <section class="panel">
          <label for="stakeholderSelect">涉众角色</label>
          <select id="stakeholderSelect"></select>
          <p id="stakeholderGoal" class="muted"></p>
        </section>

        <section class="panel">
          <button id="a1bRun" class="primary" type="button" disabled>A1b 半自动追问</button>
          <button id="a1bRunAll" type="button" disabled>A1b 访谈全部涉众三轮</button>
          <button id="saveRecord" type="button" disabled>保存当前手动会话</button>
          <button id="clearChat" type="button">清空当前会话</button>
          <p id="batchStatus" class="status">批量访谈未开始</p>
        </section>

        <section class="panel">
          <div class="panel-title">A2 需求质量分析</div>
          <p id="a2NotesStatus" class="status">正在读取需求记录...</p>
          <button id="a2Analyze" class="primary" type="button" disabled>运行 A2 质量分析</button>
          <button id="a2Plan" type="button" disabled>生成回退追问</button>
          <button id="a2Rollback" type="button" disabled>执行回退访谈</button>
          <p id="a2Status" class="status">尚未运行 A2</p>
        </section>

        <section class="panel">
          <div class="panel-title">A3 UML 建模</div>
          <p id="a3Status" class="status">正在读取建模状态...</p>
          <button id="a3Model" class="primary" type="button" disabled>运行 A3 建模</button>
        </section>

        <section class="panel">
          <div class="panel-title">A4 SRS 文档生成</div>
          <p id="a4Status" class="status">正在读取 SRS 状态...</p>
          <button id="a4Generate" class="primary" type="button" disabled>生成 SRS 初稿</button>
        </section>

        <section class="panel">
          <div class="panel-title">A5 需求验证</div>
          <p id="a5Status" class="status">正在读取验证状态...</p>
          <button id="a5Validate" class="primary" type="button" disabled>运行 A5 验证</button>
        </section>

        <section class="panel records-panel">
          <div class="panel-title">本页保存记录</div>
          <ul id="records"></ul>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <div id="modelInfo" class="model-info">模型加载中...</div>
            <div class="muted">真人提问和 A1b 追问都会按轮自动保存。</div>
          </div>
        </header>

        <section id="chatLog" class="chat-log"></section>

        <section id="a2Output" class="a2-output" hidden>
          <h2>智能体输出</h2>
          <pre id="a2OutputText"></pre>
        </section>

        <form id="chatForm" class="composer">
          <textarea id="messageInput" rows="3" placeholder="向当前 A1a 涉众智能体提问..." disabled></textarea>
          <button id="sendMessage" class="primary" type="submit" disabled>发送给 A1a</button>
        </form>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
